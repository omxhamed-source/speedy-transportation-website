<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" role="img" aria-labelledby="title desc">
  <title id="title">Speedy Transportation LLC logo</title>
  <desc id="desc">White Speedy wordmark with red motion lines and transportation text.</desc>
  <defs>
    <filter id="redGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95 0 0 0 0 0.04 0 0 0 0 0.10 0 0 0 0.9 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="whiteShadow" x="-20%" y="-40%" width="140%" height="180%">
